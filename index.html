<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#0a0a0f; color:#e0e0e0; }
.header { background:linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding:24px 32px; border-bottom:1px solid #2a2a4a; }
.header h1 { font-size:24px; color:#fff; }
.header .meta { color:#888; font-size:13px; margin-top:4px; }
.container { max-width:1400px; margin:0 auto; padding:24px; }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:16px; margin-bottom:32px; }
.stat-card { background:#151520; border:1px solid #2a2a4a; border-radius:12px; padding:20px; text-align:center; }
.stat-card .number { font-size:28px; font-weight:700; color:#7c83ff; }
.stat-card .label { font-size:12px; color:#888; margin-top:4px; text-transform:uppercase; }
.chart-container { background:#151520; border:1px solid #2a2a4a; border-radius:12px; padding:24px; margin-bottom:32px; }
.chart-container h2 { font-size:18px; margin-bottom:16px; color:#fff; }
.layer-tabs { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:24px; }
.layer-tab { padding:8px 16px; border-radius:8px; border:1px solid #2a2a4a; background:#151520; color:#ccc; cursor:pointer; font-size:13px; transition:all 0.2s; }
.layer-tab:hover,.layer-tab.active { background:#7c83ff; color:#fff; border-color:#7c83ff; }
.tweets-container { display:grid; gap:12px; }
.tweet-card { background:#1a1a2e; border:1px solid #2a2a4a; border-radius:10px; padding:16px; }
.tweet-card .tweet-header { display:flex; justify-content:space-between; margin-bottom:8px; }
.tweet-card .handle { color:#7c83ff; font-weight:600; font-size:14px; }
.tweet-card .sentiment-badge { padding:2px 8px; border-radius:12px; font-size:11px; font-weight:600; }
.sentiment-positive { background:#1a3a2a; color:#4ade80; }
.sentiment-negative { background:#3a1a1a; color:#f87171; }
.sentiment-neutral { background:#2a2a3a; color:#999; }
.tweet-card .text { font-size:14px; line-height:1.5; color:#ccc; margin-bottom:8px; }
.tweet-card .metrics { display:flex; gap:16px; font-size:12px; color:#666; }
.trending-list { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:12px; }
.trending-item { background:#1a1a2e; border:1px solid #2a2a4a; border-radius:8px; padding:12px 16px; }
.trending-item .topic { font-weight:600; color:#fff; }
.trending-item .cat { font-size:12px; color:#888; }
canvas { max-height:400px; }
</style>
</head>

ly positions an AI model as the primary gatekeeper between everyday consumers and the local economy.", "time": "2026-03-13T00:00:00.000Z", "replies": "23", "reposts": "64", "likes": "282", "views": "63K", "sentiment": "neutral", "score": 0.0}, {"handle": "Perplexity", "author": "Perplexity", "text": "Announcing Personal Computer.\n\nPersonal Computer is an always on, local merge with Perplexity Computer that works for you 24/7.\n\nIt's personal, secure, and works across your files, apps, and sessions through a continuously running Mac mini.", "time": "2026-03-11T17:51:42.000Z", "replies": "1.6K", "reposts": "5.7K", "likes": "32K", "views": "14M", "sentiment": "neutral", "score": 0.0}, {"handle": "0xMarioNawfal", "author": "0xMarioNawfal", "text": "NVIDIA JUST DROPPED NEMO CLAW TO MAKE OPENCLAW SAFE TO RUN ON YOUR OWN MACHINE.\n\nIt keeps private files off the cloud, runs fully offline, and adds the security layer local AI agents were missing.", "time": "2026-03-17T22:15:00.000Z", "replies": "91", "reposts": "186", "likes": "1.9K", "views": "214K", "sentiment": "neutral", "score": 0.0}], "indie_saas": [{"handle": "weisser", "author": "weisser", "text": "$1.5M ARR in 2 weeks.\n\nZero (human) teammates.\n\nSolo Founders Podcast is live with @bencera of @polsia, an AI that runs your company while you sleep.\n\nHis solo founder rule: 80% AI, 20% taste.", "time": "2026-03-04T00:00:00.000Z", "replies": "0", "reposts": "0", "likes": "0", "views": "0", "sentiment": "neutral", "score": 0.0}, {"handle": "Ben Cera", "author": "Ben Cera", "text": "About to hit $4.5M run rate. Still 1 founder + AI. Zero employees.", "time": "2026-03-17T00:00:00.000Z", "replies": "69", "reposts": "106", "likes": "1.6K", "views": "597K", "sentiment": "neutral", "score": 0.0}, {"handle": "Linus Ekenstam", "author": "Linus Ekenstam", "text": "Pay attention. Ben is on the pathway to become the first billion dollar solo founder. In less than 2 months he has grown from 0-4.4M in ARR. This is absolutely insane.", "time": "2026-03-18T00:00:00.000Z", "replies": "0", "reposts": "0", "likes": "0", "views": "0", "sentiment": "neutral", "score": 0.0}, {"handle": "0xMarioNawfal", "author": "0xMarioNawfal", "text": "This is the solo startup cheatsheet\n\n- n8n automation\n- Supabase backend\n- Cursor code\n- Claude thinking\n- Vercel deploy\n- Stripe payments\n- Resend emails\n- Framer landing page\n- PostHog analytics\n- Cloudflare security", "time": "2026-03-02T13:15:00.000Z", "replies": "86", "reposts": "243", "likes": "2.3K", "views": "154K", "sentiment": "neutral", "score": 0.0}, {"handle": "@levelsio", "author": "@levelsio", "text": "how to build a bootstrapped startup without funding:\n\n1. pick a problem you personally have. if you don't use your own product daily, quit now\n\n2. skip the pitch deck. open your code editor. ship something ugly in a weekend\n\n3. charge money from day 1. free users give you nothing", "time": "2026-02-24T20:32:04.000Z", "replies": "727", "reposts": "1.1K", "likes": "12K", "views": "605K", "sentiment": "negative", "score": -1.0}], "pm_ai": [{"handle": "Tuki", "author": "Tuki", "text": "Do you understand what JPMorgan just said in plain English..\n\nStop scrolling and read..\n\n$40 to $150 billion in loans.. the ones that funded companies that hired humans to do jobs.. are about to blow up because AI is replacing the humans that generated the revenue that paid", "time": "2026-03-20T00:00:00.000Z", "replies": "0", "reposts": "0", "likes": "0", "views": "0", "sentiment": "neutral", "score": 0.0}, {"handle": "Dustin", "author": "Dustin", "text": "Bret Taylor, former co-CEO of Salesforce and chair of OpenAI, just redefined the unit of productivity.\n\nIt's not a person.\n\nIt's a process.\n\nAI won't replace a worker. It will compress entire workflows.", "time": "2026-03-12T12:03:01.000Z", "replies": "30", "reposts": "95", "likes": "478", "views": "100K", "sentiment": "negative", "score": -1.0}, {"handle": "The Rundown AI", "author": "The Rundown AI", "text": "Anthropic just studied which jobs AI can theoretically replace vs. which ones it's actually automating right now.\n\nComputer & math: 94% exposed. Legal: ~90%. Management, architecture, arts & media: all 60%+.\n\nObserved usage so far? A fraction of that.\n\nBut the gap is closing", "time": "2026-03-06T01:53:41.000Z", "replies": "181", "reposts": "623", "likes": "3.1K", "views": "406K", "sentiment": "negative", "score": -1.0}], "trending": []};
const trendingData = [{"topic": "Anthropic Ditches Long Roadmaps for Rapid AI Experiments", "category": "Other", "count": "703 posts"}, {"topic": "X Users Discuss Viral OpenClaw Open-Source AI Agent", "category": "Other", "count": "217 posts"}, {"topic": "$QNT", "category": "Trending", "count": ""}, {"topic": "Morning Jo", "category": "Trending in United Kingdom", "count": ""}, {"topic": "#WorldIndoorChamps", "category": "Trending", "count": ""}, {"topic": "Easter", "category": "Entertainment industry \u00b7 Trending", "count": ""}, {"topic": "Amad", "category": "Sports \u00b7 Trending", "count": ""}, {"topic": "Cadbury", "category": "Trending in United Kingdom", "count": ""}, {"topic": "Mark Cuban Urges Youth to Master AI Agents for Small Businesses", "category": "Other", "count": "1.1K posts"}, {"topic": "30,000 Attend Birmingham Eid Prayers Amid Online Criticism", "category": "Other", "count": "32K posts"}, {"topic": "Anthropic Rapid AI Product Development Reshapes PM Role", "category": "News", "count": "354 posts"}];

Object.values(layerData).forEach(d => { totalAll += d.total; totalPos += d.positive; totalNeg += d.negative; });
[['Total Posts', totalAll], ['Positive', totalPos], ['Negative', totalNeg], ['Neutral', totalAll-totalPos-totalNeg], ['Layers', Object.keys(LAYERS).length]].forEach(([label,num]) => {
  sg.innerHTML += `<div class="stat-card"><div class="number">${num}</div><div class="label">${label}</div></div>`;
});

// Chart
const ctx = document.getElementById('sentimentChart').getContext('2d');
new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ["AI Agents", "Crypto AI Agents", "XRP / Ripple", "AI Singularity / AGI", "Local AI / On-Device", "Indie SaaS", "PM + AI / AI Replacing Jobs"],
    datasets: [
      { label:'Positive', data:[1, 1, 1, 1, 0, 0, 0], backgroundColor:'rgba(74,222,128,0.7)' },
      { label:'Negative', data:[1, 0, 0, 0, 0, 1, 2], backgroundColor:'rgba(248,113,113,0.7)' },
      { label:'Neutral', data:[2, 5, 5, 2, 4, 4, 1], backgroundColor:'rgba(148,148,168,0.5)' }
    ]
  },
  options: { responsive:true, scales:{ x:{stacked:true}, y:{stacked:true} } }
});

// Layer tabs
const tabs = document.getElementById('layerTabs');
const tc = document.getElementById('tweetsContainer');
let activeLayer = Object.keys(LAYERS)[0];
function renderTabs() {
  tabs.innerHTML = '';
  Object.entries(LAYERS).forEach(([k,v]) => {
    const btn = document.createElement('button');
    btn.className = 'layer-tab' + (k === activeLayer ? ' active' : '');
    btn.textContent = v + (layerData[k] ? ` (${layerData[k].total})` : ' (0)');
    btn.onclick = () => { activeLayer = k; renderTabs(); renderTweets(); };
    tabs.appendChild(btn);
  });
}
function renderTweets() {
  const posts = recentPosts[activeLayer] || [];
  if (!posts.length) { tc.innerHTML = '<div style="color:#666;padding:20px;">No posts scraped yet for this layer.</div>'; return; }
  tc.innerHTML = posts.map(p => `
    <div class="tweet-card">
      <div class="tweet-header">

        <span class="sentiment-badge sentiment-${p.sentiment}">${p.sentiment}</span>

}

  tl.innerHTML = trendingData.map(t => `

} else {
  tl.innerHTML = '<div style="color:#666;">No trending data yet.</div>';
}
</script>
