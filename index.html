<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X Sentiment Dashboard – AI & Tech</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1419;color:#e7e9ea;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:24px 32px;border-bottom:1px solid #2f3336;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:24px;background:linear-gradient(90deg,#1d9bf0,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .updated{color:#71767b;font-size:13px}
.container{max-width:1400px;margin:0 auto;padding:24px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.tab{padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;background:#1e2732;color:#8899a6;border:1px solid #2f3336;transition:all .2s}
.tab:hover{background:#253341}
.tab.active{background:#1d9bf0;color:#fff;border-color:#1d9bf0}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:#1e2732;border-radius:12px;padding:20px;border:1px solid #2f3336}
.kpi .label{font-size:12px;color:#71767b;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
