function switchLayer(layer) {

    tabsEl.children[0].classList.add('active');

    card.className = 'post-card';
    const url = p.id ? 'https://x.com/i/status/' + p.id : '#';
    card.innerHTML = '<div class="meta"><a href="'+url+'" target="_blank" class="handle" style="color:#58a6ff;text-decoration:none">'+p.handle+' <span style="color:#8b949e;font-weight:400">'+p.author+'</span></a><span class="sentiment '+p.sentiment+'">'+p.sentiment+' ('+p.score+')</span></div><div class="text">'+p.text.replace(/</g,'&lt;')+'</div><div class="stats"><span>❤ '+p.likes.toLocaleString()+'</span><span>🔁 '+p.reposts.toLocaleString()+'</span><span>👁 '+p.views.toLocaleString()+'</span><span>📅 '+p.date+'</span></div>';
    container.appendChild(card);
  });
}

// Trending
const trendEl = document.getElementById('trendingList');
trending.forEach(t => {
  const item = document.createElement('div');
  item.className = 'trending-item';
  item.innerHTML = '<div class="topic">'+t.topic+'</div><div class="cat">'+t.category+(t.post_count?' · '+t.post_count:'')+'</div>';
  trendEl.appendChild(item);
});

renderCharts();
renderPosts();
</script>
</body>
</html>
