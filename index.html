uctures, and capital flows.", "layer": "xrp", "sentiment": "neutral", "score": 0.0, "scraped": "2026-03-20T00:10:33.623974"}, {"handle": "Chad Steingraber", "author": "Chad Steingraber", "text": "Now we know why Elon won't talk about XRP.", "layer": "xrp", "sentiment": "neutral", "score": 0.0, "scraped": "2026-03-20T00:10:33.622233"}, {"handle": "Ripple", "author": "Ripple", "text": "Digital assets are moving from experimentation to real-world use. We see collaboration across the ecosystem as key to connecting onchain innovation with trusted global payments infrastructure. Initiatives like the Mastercard Crypto Partner Program help bring builders,", "layer": "xrp", "sentiment": "neutral", "score": 0.0, "scraped": "2026-03-20T00:10:33.620481"}, {"handle": "evernorthxrp", "author": "evernorthxrp", "text": "Read this before you react to the Fed today: XRP surpassed 7.7 million non-empty wallets for the first time in its 13-year history, with active addresses hitting a five-week peak of 46,767 on March 16. Tokenized commodities on XRP have grown from $111 million to $1.14 billion", "layer": "xrp", "sentiment": "neutral", "score": 0.0, "scraped": "2026-03-20T00:10:33.618430"}, {"handle": "David JoelKatz Schwartz", "author": "David JoelKatz Schwartz", "text": "Hey grok, can you explain to this person who created XRP and whether it is one of the most popular deflationary currencies in existence?", "layer": "xrp", "sentiment": "neutral", "score": 0.0, "scraped": "2026-03-20T00:10:33.615141"}, {"handle": "Stuart Alderoty", "author": "Stuart Alderoty", "text": "We always knew XRP was not a security - and now the SECGov has made clear what it is: a digital commodity. Grateful to the Crypto Task Force for working to deliver the clarity that markets, investors, and innovators have long deserved.", "layer": "xrp", "sentiment": "neutral", "score": 0.0, "scraped": "2026-03-20T00:10:33.612367"}, {"handle": "Ripple Bull Winkle", "author": "Ripple Bull Winkle", "text": "A billion-doll const layerLabels = {"agents": "AI Agents", "crypto": "Crypto AI", "xrp": "XRP / Ripple", "singularity": "Singularity / AGI", "local_ai": "Local AI", "indie_saas": "Indie SaaS", "pm_ai": "PM + AI", "trending": "Trending"};
const layerColors = {"agents": "#3b82f6", "crypto": "#f59e0b", "xrp": "#10b981", "singularity": "#8b5cf6", "local_ai": "#ef4444", "indie_saas": "#ec4899", "pm_ai": "#06b6d4", "trending": "#6b7280"};

// Stats cards
const sg = document.getElementById('stats-grid');
Object.entries(statsData).forEach(([k,v]) => {
    const sentClass = v.avg_score > 0.1 ? 'pos' : v.avg_score < -0.1 ? 'neg' : 'neu';
    sg.innerHTML += `<div class="stat-card">
        <h3 style="color:${v.color}">${v.label}</h3>
        <div class="number">${v.total}</div>
        <div class="sentiment ${sentClass}">Avg: ${v.avg_score?.toFixed(2) || '0.00'}</div>
        <div style="font-size:0.75rem;color:#64748b;margin-top:4px">+${v.positive} / -${v.negative} / =${v.neutral}</div>
    </div>`;
});

// Sentiment chart
const ctx1 = document.getElementById('sentimentChart').getContext('2d');
const datasets = Object.entries(hourlyData).map(([layer, points]) => ({
    label: layerLabels[layer] || layer,
    data: points.map(p => ({x: p.hour, y: p.score})),
    borderColor: layerColors[layer] || '#6b7280',
    backgroundColor: (layerColors[layer] || '#6b7280') + '20',
    tension: 0.3,
    pointRadius: 2,
    borderWidth: 2
}));
new Chart(ctx1, {
    type: 'line',
    data: { datasets },
    options: {
        responsive: true,
        plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } },
        scales: {
            x: { ticks: { color: '#64748b', maxTicksLimit: 12 }, grid: { color: '#1e293b' } },
            y: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' }, min: -1, max: 1,
                 title: { display: true, text: 'Sentiment', color: '#64748b' } }
        }
    }
});

// Volume chart
const ctx2 = document.getElementById('volumeChart').getContext('2d');
const volLabels = Object.keys(statsData).map(k => layerLabels[k] || k);
const volData = Object.values(statsData).map(v => v.total);
const volColors = Object.keys(statsData).map(k => layerColors[k] || '#6b7280');
new Chart(ctx2, {
    type: 'bar',
    data: {
        labels: volLabels,
        datasets: [{ data: volData, backgroundColor: volColors, borderRadius: 6 }]
    },
    options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
            x: { ticks: { color: '#94a3b8' }, grid: { display: false } },
            y: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } }
        }
    }
});

// Trending
const tg = document.getElementById('trending-grid');
trendingData.forEach(t => {
    tg.innerHTML += `<div class="trend-card">
        <div class="trend-topic">${t.topic}</div>
        <div class="trend-meta">${t.category || ''} ${t.count ? '· ' + t.count + ' posts' : ''}</div>
    </div>`;
});

// Filter + tweets
let activeFilter = 'all';
const fb = document.getElementById('filter-bar');
fb.innerHTML = '<button class="filter-btn active" data-layer="all">All</button>';
Object.entries(layerLabels).forEach(([k,v]) => {
    fb.innerHTML += `<button class="filter-btn" data-layer="${k}">${v}</button>`;
});
fb.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        fb.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.layer;
        renderTweets();
    });
});

function renderTweets() {
    const tl = document.getElementById('tweets-list');
    const filtered = activeFilter === 'all' ? recentData : recentData.filter(t => t.layer === activeFilter);
    tl.innerHTML = filtered.slice(0, 50).map(t => `
        <div class="tweet">
            <div class="tweet-header">
                <span class="tweet-handle">${t.handle}</span>
                <span class="tweet-layer" style="border-color:${layerColors[t.layer] || '#334155'}">${layerLabels[t.layer] || t.layer}</span>
            </div>
            <div class="tweet-text">${t.text}</div>
            <div class="tweet-meta">
                <span class="${t.sentiment === 'positive' ? 'pos' : t.sentiment === 'negative' ? 'neg' : 'neu'}">${t.sentiment} (${t.score?.toFixed(2)})</span>
                <span>${t.scraped?.substring(0, 16) || ''}</span>
            </div>
        </div>
    `).join('');
}
renderTweets();
</script>
