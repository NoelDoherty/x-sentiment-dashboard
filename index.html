* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #e0e0e0; }

.tabs { display: flex; gap: 4px; padding: 12px 32px; background: #0d0d1a; flex-wrap: wrap; }

.tab.active { background: #6c63ff; color: #fff; border-color: #6c63ff; }
.content { padding: 24px 32px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.card { background: #111122; border: 1px solid #1a1a3a; border-radius: 12px; padding: 20px; }

.tweet { padding: 12px; border-bottom: 1px solid #1a1a3a; }
.tweet:last-child { border-bottom: none; }
.tweet .handle { color: #6c63ff; font-weight: 600; font-size: 13px; }
.tweet .text { color: #ccc; font-size: 13px; margin: 4px 0; line-height: 1.4; }
.tweet .metrics { color: #666; font-size: 11px; }
.sentiment-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.sentiment-positive { background: #1a3a1a; color: #4caf50; }
.sentiment-negative { background: #3a1a1a; color: #f44336; }
.sentiment-neutral { background: #2a2a2a; color: #999; }
.chart-container { position: relative; height: 250px; }
.trending-item { padding: 8px 12px; border-bottom: 1px solid #1a1a3a; display: flex; justify-content: space-between; }
.trending-item .topic { color: #6c63ff; font-weight: 600; }
.trending-item .count { color: #888; font-size: 12px; }
.layer-section { display: none; }
.layer-section.active { display: block; }
@media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
</style>
