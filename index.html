<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X Sentiment Dashboard - AI & Crypto Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 24px 32px; border-bottom: 1px solid #334155; }
.header h1 { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header .subtitle { color: #94a3b8; font-size: 14px; margin-top: 4px; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
.stat-card .label { color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
.stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
.stat-card .sub { color: #64748b; font-size: 12px; margin-top: 2px; }
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
@media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
.chart-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
.chart-card h3 { font-size: 16px; margin-bottom: 16px; color: #e2e8f0; }
.section { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; margin-bottom: 24px; }
.section h3 { font-size: 16px; margin-bottom: 16px; color: #e2e8f0; }
.trending-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.trend-tag { background: #334155; color: #e2e8f0; padding: 6px 12px; border-radius: 20px; font-size: 13px; }
.trend-tag .cat { color: #94a3b8; font-size: 11px; }
.layer-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.layer-tab { background: #334155; color: #94a3b8; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
.layer-tab.active { background: #3b82f6; color: white; }
.layer-tab:hover { background: #475569; color: white; }
.posts-list { display: flex; flex-direction: column; gap: 12px; }
.post-card { background: #0f172a; border-radius: 8px; padding: 16px; border: 1px solid #334155; }
.post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.post-handle { color: #60a5fa; font-weight: 600; font-size: 14px; }
.post-date { color: #64748b; font-size: 12px; }
.post-text { color: #cbd5e1; font-size: 14px; line-height: 1.5; margin-bottom: 8px; }
.post-metrics { display: flex; gap: 16px; color: #64748b; font-size: 12px; }
.post-metrics span { display: flex; align-items: center; gap: 4px; }
.sentiment-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.sentiment-pos { background: #064e3b; color: #6ee7b7; }
.sentiment-neg { background: #7f1d1d; color: #fca5a5; }
.sentiment-neu { background: #1e293b; color: #94a3b8; }
.footer { text-align: center; color: #475569; font-size: 12px; padding: 24px; }
</style>
</head>
<body>
<div class="header">
  <h1>X Sentiment Dashboard</h1>
  <div class="subtitle">AI & Crypto Narrative Tracker &middot; Last updated: 2026-03-24 18:19 UTC &middot; 86 posts across 7 layers &middot; 20 trending topics</div>
</div>
